<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScrollMagic - 专业级滚动动画演示</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ScrollMagic/2.0.8/ScrollMagic.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ScrollMagic/2.0.8/plugins/debug.addIndicators.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
      --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-in-out-quint: cubic-bezier(0.83, 0, 0.17, 1);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #0f172a 50%, #0a0a0f 100%);
      color: #fff;
      overflow-x: hidden;
    }

    /* 导航栏 - 玻璃拟态 */
    .nav {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      padding: 12px 24px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .nav-title {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.9);
    }

    .nav-progress {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-left: 8px;
    }

    .nav-links {
      display: flex;
      gap: 16px;
    }

    .nav-links a {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.3s var(--ease-out-expo);
      position: relative;
    }

    .nav-links a:hover {
      color: rgba(255,255,255,0.9);
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, #8b5cf6, #ec4899);
      transition: width 0.3s var(--ease-out-expo);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    /* 进度条 */
    .progress-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(255,255,255,0.03);
      z-index: 999;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #22d3ee, #a855f7, #ec4899);
      width: 0%;
      box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
    }

    /* Section 通用样式 */
    .section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 100px 40px;
    }

    /* ===== Hero Section ===== */
    .hero {
      background: radial-gradient(ellipse at 50% 50%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
    }

    .hero-content {
      text-align: center;
      position: relative;
      z-index: 10;
    }

    .hero-title {
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 50%, #c084fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 40px rgba(139, 92, 246, 0.3));
      opacity: 0;
      transform: translateY(60px);
      transition: all 1.2s var(--ease-out-expo);
    }

    .hero-title.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .hero-subtitle {
      font-size: 1.25rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(30px);
      transition: all 1s var(--ease-out-expo) 0.3s;
    }

    .hero-subtitle.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .scroll-hint {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      opacity: 0;
      transition: opacity 0.8s var(--ease-out-expo) 0.6s;
    }

    .scroll-hint.visible {
      opacity: 0.6;
    }

    .scroll-hint span {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    .scroll-line {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.4; transform: scaleY(1); }
      50% { opacity: 1; transform: scaleY(1.2); }
    }

    /* ===== 文字编排 Section ===== */
    .typography-section {
      background: linear-gradient(180deg, transparent 0%, rgba(15, 23, 42, 0.5) 100%);
    }

    .typography-list {
      max-width: 900px;
      width: 100%;
    }

    .typography-item {
      margin-bottom: 48px;
      opacity: 0;
      transform: translateX(-100px);
      transition: all 1s var(--ease-out-quart);
    }

    .typography-item.visible {
      opacity: 1;
      transform: translateX(0);
    }

    .typography-item:nth-child(2) { transition-delay: 0.15s; }
    .typography-item:nth-child(3) { transition-delay: 0.3s; }

    .typography-main {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      display: inline-block;
      margin-right: 20px;
    }

    .typography-main.cyan {
      background: linear-gradient(135deg, #22d3ee 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .typography-main.purple {
      background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .typography-main.orange {
      background: linear-gradient(135deg, #fb923c 0%, #ef4444 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .typography-sub {
      font-size: 1.125rem;
      color: rgba(255,255,255,0.4);
      font-weight: 400;
    }

    /* ===== 卡片 Section ===== */
    .cards-section {
      perspective: 1000px;
    }

    .cards-container {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      width: 200px;
      height: 280px;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      opacity: 0;
      transform: translateY(80px) rotateY(15deg) scale(0.8);
      transition: all 1s var(--ease-out-expo);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .card.visible {
      opacity: 1;
      transform: translateY(0) rotateY(0) scale(1);
    }

    .card:nth-child(2) { transition-delay: 0.15s; }
    .card:nth-child(3) { transition-delay: 0.3s; }

    .card.pink {
      background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);
    }

    .card.amber {
      background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
    }

    .card.emerald {
      background: linear-gradient(135deg, #10b981 0%, #14b8a6 100%);
    }

    .card-icon {
      font-size: 4rem;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: white;
    }

    /* ===== 视差 Section ===== */
    .parallax-section {
      position: relative;
      overflow: hidden;
    }

    .parallax-bg {
      position: absolute;
      inset: -20%;
      background: radial-gradient(ellipse at 50% 50%, rgba(139, 92, 246, 0.2) 0%, transparent 60%);
      will-change: transform;
    }

    .parallax-element {
      position: absolute;
      border-radius: 50%;
      will-change: transform;
      filter: blur(2px);
    }

    .parallax-element.yellow {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.6), rgba(249, 115, 22, 0.6));
      left: 15%;
      top: 30%;
    }

    .parallax-element.cyan {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.6), rgba(59, 130, 246, 0.6));
      right: 20%;
      bottom: 25%;
    }

    .parallax-element.pink {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, rgba(236, 72, 153, 0.6), rgba(168, 85, 247, 0.6));
      left: 60%;
      top: 20%;
    }

    .parallax-content {
      position: relative;
      z-index: 10;
      text-align: center;
    }

    .parallax-title {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 16px;
      opacity: 0;
      transform: translateY(30px);
      transition: all 1s var(--ease-out-expo);
    }

    .parallax-title.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .parallax-desc {
      font-size: 1.125rem;
      color: rgba(255,255,255,0.5);
      opacity: 0;
      transition: all 1s var(--ease-out-expo) 0.2s;
    }

    .parallax-desc.visible {
      opacity: 1;
    }

    /* ===== 形态变换 Section ===== */
    .morph-section {
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.5) 0%, transparent 100%);
    }

    .morph-container {
      position: relative;
      width: 300px;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .morph-shape {
      width: 200px;
      height: 200px;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 
        0 20px 60px rgba(139, 92, 246, 0.4),
        inset 0 0 60px rgba(255,255,255,0.1);
      will-change: transform, border-radius;
    }

    .morph-icon {
      font-size: 5rem;
      will-change: transform;
    }

    .morph-orbit {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      will-change: transform, opacity;
    }

    /* ===== 完成 Section ===== */
    .complete-section {
      background: radial-gradient(ellipse at 50% 50%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
    }

    .complete-content {
      text-align: center;
      opacity: 0;
      transform: translateY(50px) scale(0.9);
      transition: all 1.2s var(--ease-out-back);
    }

    .complete-content.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .complete-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 32px;
      background: linear-gradient(135deg, #34d399 0%, #22d3ee 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      box-shadow: 0 0 60px rgba(52, 211, 153, 0.4);
      animation: completePulse 3s ease-in-out infinite;
    }

    @keyframes completePulse {
      0%, 100% { box-shadow: 0 0 60px rgba(52, 211, 153, 0.4); }
      50% { box-shadow: 0 0 80px rgba(52, 211, 153, 0.6); }
    }

    .complete-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #fff 0%, #34d399 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .complete-desc {
      font-size: 1.125rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 40px;
    }

    .complete-links {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .complete-links a {
      padding: 12px 28px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.3s var(--ease-out-expo);
    }

    .complete-links a:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }

    /* 右侧导航点 */
    .nav-dots {
      position: fixed;
      right: 40px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 100;
    }

    .nav-dot {
      width: 3px;
      height: 32px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s var(--ease-out-expo);
    }

    .nav-dot::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 0%;
      background: linear-gradient(to bottom, #22d3ee, #a855f7);
      border-radius: 2px;
      transition: height 0.5s var(--ease-out-expo);
    }

    .nav-dot.active::after {
      height: 100%;
    }

    .nav-dot.active {
      box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .nav {
        padding: 10px 16px;
        gap: 12px;
      }

      .nav-links {
        display: none;
      }

      .section {
        padding: 80px 20px;
      }

      .cards-container {
        flex-direction: column;
        align-items: center;
      }

      .card {
        width: 160px;
        height: 220px;
      }

      .nav-dots {
        right: 20px;
      }

      .morph-container {
        width: 250px;
        height: 250px;
      }

      .morph-shape {
        width: 150px;
        height: 150px;
      }
    }
  </style>
</head>
<body>
  <!-- 导航 -->
  <nav class="nav">
    <div class="nav-brand">
      <div class="nav-icon">✨</div>
      <div>
        <span class="nav-title">ScrollMagic</span>
        <span class="nav-progress" id="navProgress">0%</span>
      </div>
    </div>
    <div class="nav-links">
      <a href="#hero">首页</a>
      <a href="#typography">文字</a>
      <a href="#cards">卡片</a>
      <a href="#parallax">视差</a>
      <a href="#morph">变换</a>
      <a href="#complete">完成</a>
    </div>
  </nav>

  <!-- 进度条 -->
  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- 导航点 -->
  <div class="nav-dots">
    <div class="nav-dot active" data-section="0"></div>
    <div class="nav-dot" data-section="1"></div>
    <div class="nav-dot" data-section="2"></div>
    <div class="nav-dot" data-section="3"></div>
    <div class="nav-dot" data-section="4"></div>
    <div class="nav-dot" data-section="5"></div>
  </div>

  <!-- Hero -->
  <section class="section hero" id="hero">
    <div class="hero-content">
      <h2 class="hero-title" id="heroTitle">ScrollMagic</h2>
      <p class="hero-subtitle" id="heroSubtitle">滚动动画的艺术</p>
    </div>
    <div class="scroll-hint" id="scrollHint">
      <span>Scroll</span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- 文字编排 -->
  <section class="section typography-section" id="typography">
    <div class="typography-list">
      <div class="typography-item" id="type1">
        <span class="typography-main cyan">精确控制</span>
        <span class="typography-sub">每一帧动画</span>
      </div>
      <div class="typography-item" id="type2">
        <span class="typography-main purple">流畅过渡</span>
        <span class="typography-sub">自然的运动曲线</span>
      </div>
      <div class="typography-item" id="type3">
        <span class="typography-main orange">性能优先</span>
        <span class="typography-sub">60fps 丝滑体验</span>
      </div>
    </div>
  </section>

  <!-- 卡片层叠 -->
  <section class="section cards-section" id="cards">
    <div class="cards-container">
      <div class="card pink" id="card1">
        <span class="card-icon">🎨</span>
        <span class="card-title">视觉</span>
      </div>
      <div class="card amber" id="card2">
        <span class="card-icon">⚡</span>
        <span class="card-title">性能</span>
      </div>
      <div class="card emerald" id="card3">
        <span class="card-icon">🎯</span>
        <span class="card-title">精准</span>
      </div>
    </div>
  </section>

  <!-- 视差滚动 -->
  <section class="section parallax-section" id="parallax">
    <div class="parallax-bg" id="parallaxBg"></div>
    <div class="parallax-element yellow" id="parallaxYellow"></div>
    <div class="parallax-element cyan" id="parallaxCyan"></div>
    <div class="parallax-element pink" id="parallaxPink"></div>
    <div class="parallax-content">
      <h3 class="parallax-title" id="parallaxTitle">视差深度</h3>
      <p class="parallax-desc" id="parallaxDesc">多层元素以不同速度移动</p>
    </div>
  </section>

  <!-- 形态变换 -->
  <section class="section morph-section" id="morph">
    <div class="morph-container">
      <div class="morph-orbit" id="morphOrbit"></div>
      <div class="morph-shape" id="morphShape">
        <span class="morph-icon" id="morphIcon">🎭</span>
      </div>
    </div>
  </section>

  <!-- 完成 -->
  <section class="section complete-section" id="complete">
    <div class="complete-content" id="completeContent">
      <div class="complete-icon">✨</div>
      <h2 class="complete-title">完成</h2>
      <p class="complete-desc">ScrollMagic 让滚动动画变得优雅</p>
      <div class="complete-links">
        <a href="https://scrollmagic.io" target="_blank">访问官网</a>
        <a href="https://github.com/janpaepke/ScrollMagic" target="_blank">GitHub</a>
      </div>
    </div>
  </section>

  <script>
    // 初始化 ScrollMagic
    const controller = new ScrollMagic.Controller();

    // 全局进度条
    new ScrollMagic.Scene({
      triggerElement: 'body',
      triggerHook: 'onLeave',
      duration: document.body.scrollHeight - window.innerHeight
    })
    .on('progress', (event) => {
      const progress = Math.round(event.progress * 100);
      document.getElementById('progressBar').style.width = progress + '%';
      document.getElementById('navProgress').textContent = progress + '%';
      
      // 更新导航点
      const activeSection = Math.floor(event.progress * 6);
      document.querySelectorAll('.nav-dot').forEach((dot, index) => {
        dot.classList.toggle('active', index === activeSection);
      });
    })
    .addTo(controller);

    // Hero 动画
    new ScrollMagic.Scene({
      triggerElement: '.hero',
      triggerHook: 0.8
    })
    .on('enter', () => {
      document.getElementById('heroTitle').classList.add('visible');
      document.getElementById('heroSubtitle').classList.add('visible');
      document.getElementById('scrollHint').classList.add('visible');
    })
    .addTo(controller);

    // Hero 退出
    new ScrollMagic.Scene({
      triggerElement: '.hero',
      triggerHook: 0,
      duration: '100%'
    })
    .on('progress', (event) => {
      const opacity = 1 - event.progress;
      const scale = 1 - event.progress * 0.1;
      const translateY = -event.progress * 100;
      
      document.querySelector('.hero-content').style.opacity = opacity;
      document.querySelector('.hero-content').style.transform = `translateY(${translateY}px) scale(${scale})`;
    })
    .addTo(controller);

    // 文字编排动画
    ['#type1', '#type2', '#type3'].forEach((selector, index) => {
      new ScrollMagic.Scene({
        triggerElement: selector,
        triggerHook: 0.85
      })
      .setClassToggle(selector, 'visible')
      .addIndicators({ name: `type-${index + 1}` })
      .addTo(controller);
    });

    // 卡片层叠动画
    ['#card1', '#card2', '#card3'].forEach((selector, index) => {
      new ScrollMagic.Scene({
        triggerElement: selector,
        triggerHook: 0.9
      })
      .setClassToggle(selector, 'visible')
      .addIndicators({ name: `card-${index + 1}` })
      .addTo(controller);
    });

    // 视差滚动
    new ScrollMagic.Scene({
      triggerElement: '.parallax-section',
      triggerHook: 'onEnter',
      duration: '200%'
    })
    .on('progress', (event) => {
      const progress = event.progress;
      
      // 背景
      document.getElementById('parallaxBg').style.transform = `translateY(${progress * -100}px)`;
      
      // 浮动元素 - 不同速度
      document.getElementById('parallaxYellow').style.transform = 
        `translateY(${progress * -200}px) translateX(${progress * 50}px)`;
      document.getElementById('parallaxCyan').style.transform = 
        `translateY(${progress * -150}px) translateX(${progress * -30}px)`;
      document.getElementById('parallaxPink').style.transform = 
        `translateY(${progress * -250}px) scale(${1 + progress * 0.3})`;
      
      // 内容
      document.getElementById('parallaxTitle').style.transform = `translateY(${(0.5 - progress) * 50}px)`;
      document.getElementById('parallaxTitle').style.opacity = 0.3 + progress * 0.7;
      document.getElementById('parallaxDesc').style.opacity = progress > 0.3 ? 1 : 0;
    })
    .on('enter', () => {
      document.getElementById('parallaxTitle').classList.add('visible');
      document.getElementById('parallaxDesc').classList.add('visible');
    })
    .addIndicators({ name: 'parallax' })
    .addTo(controller);

    // 形态变换
    new ScrollMagic.Scene({
      triggerElement: '.morph-section',
      triggerHook: 'onEnter',
      duration: '100%'
    })
    .on('progress', (event) => {
      const progress = event.progress;
      const shape = document.getElementById('morphShape');
      const icon = document.getElementById('morphIcon');
      const orbit = document.getElementById('morphOrbit');
      
      // 旋转和缩放
      shape.style.transform = `
        rotate(${progress * 360}deg) 
        scale(${0.8 + Math.sin(progress * Math.PI) * 0.3})
      `;
      
      // 圆角变化
      shape.style.borderRadius = `${20 + progress * 40}%`;
      
      // 图标反向旋转
      icon.style.transform = `rotate(${-progress * 360}deg)`;
      
      // 轨道
      orbit.style.transform = `scale(${1.5 + progress * 0.5}) rotate(${progress * 180}deg)`;
      orbit.style.opacity = 0.3 - progress * 0.2;
    })
    .addIndicators({ name: 'morph' })
    .addTo(controller);

    // 完成动画
    new ScrollMagic.Scene({
      triggerElement: '.complete-section',
      triggerHook: 0.7
    })
    .setClassToggle('#completeContent', 'visible')
    .addIndicators({ name: 'complete' })
    .addTo(controller);

    // 导航点点击
    document.querySelectorAll('.nav-dot').forEach((dot, index) => {
      dot.addEventListener('click', () => {
        const sections = ['#hero', '#typography', '#cards', '#parallax', '#morph', '#complete'];
        const target = document.querySelector(sections[index]);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth' });
        }
      });
    });

    // 平滑滚动导航
    document.querySelectorAll('.nav-links a').forEach(anchor => {
      anchor.addEventListener('click', function(e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({ behavior: 'smooth' });
        }
      });
    });
  </script>
</body>
</html>
